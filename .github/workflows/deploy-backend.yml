name: Deploy Backend

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/BairroNow.Api/BairroNow.Api.csproj

      - name: Build
        run: dotnet build src/BairroNow.Api/BairroNow.Api.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/BairroNow.Api.Tests/BairroNow.Api.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Publish
        run: dotnet publish src/BairroNow.Api/BairroNow.Api.csproj -c Release -o publish --no-restore

      - name: Inject production secrets
        env:
          CONN: ${{ secrets.BAIRRONOW_CONN_STRING }}
          JWT_KEY: ${{ secrets.BAIRRONOW_JWT_KEY }}
          RESEND: ${{ secrets.BAIRRONOW_RESEND_API_KEY }}
        run: |
          python3 -c "
          import json, os
          data = {
            'ConnectionStrings': {'Default': os.environ['CONN']},
            'Jwt': {'Key': os.environ['JWT_KEY']},
            'RESEND_API_KEY': os.environ['RESEND']
          }
          with open('publish/appsettings.Production.json', 'w') as f:
            json.dump(data, f, indent=2)
          "

      - name: Place app_offline.htm
        run: |
          python3 -c "
          import ftplib, io
          ftp = ftplib.FTP('${{ secrets.SMARTERASP_FTP_HOST }}', timeout=60)
          ftp.login('${{ secrets.SMARTERASP_FTP_USER }}', '${{ secrets.SMARTERASP_FTP_PASSWORD }}')
          ftp.set_pasv(True); ftp.cwd('/bairronow-api')
          ftp.storbinary('STOR app_offline.htm', io.BytesIO(b'<html>Updating</html>'))
          ftp.quit()
          "

      - name: Wait for IIS to release file locks
        run: sleep 15

      - name: FTP deploy to SmarterASP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SMARTERASP_FTP_HOST }}
          username: ${{ secrets.SMARTERASP_FTP_USER }}
          password: ${{ secrets.SMARTERASP_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /bairronow-api/
          protocol: ftp
          exclude: |
            **/app_offline.htm

      - name: Remove app_offline.htm
        if: always()
        run: |
          python3 -c "
          import ftplib
          ftp = ftplib.FTP('${{ secrets.SMARTERASP_FTP_HOST }}', timeout=60)
          ftp.login('${{ secrets.SMARTERASP_FTP_USER }}', '${{ secrets.SMARTERASP_FTP_PASSWORD }}')
          ftp.set_pasv(True); ftp.cwd('/bairronow-api')
          try: ftp.delete('app_offline.htm')
          except: pass
          ftp.quit()
          "

      - name: Smoke test
        run: |
          sleep 15
          curl -fsSL https://api.bairronow.com.br/health
          echo
          curl -fsSL https://api.bairronow.com.br/health/ready
          echo "Backend smoke OK"
