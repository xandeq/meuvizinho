name: Deploy Frontend

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @bairronow/frontend lint

      - name: Type check
        run: pnpm --filter @bairronow/frontend exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: https://api.bairronow.com.br
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Unit tests
        run: pnpm --filter @bairronow/frontend test --passWithNoTests

      - name: Build (static export)
        run: pnpm --filter @bairronow/frontend build
        env:
          NEXT_PUBLIC_API_URL: https://api.bairronow.com.br
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTGATOR_FTP_HOST }}
          username: ${{ secrets.HOSTGATOR_FTP_USER }}
          password: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: /bairronow.com.br/
          protocol: ftp

      - name: Smoke test
        run: |
          sleep 5
          curl -fsSL https://bairronow.com.br/login/ -o /dev/null
          echo "Frontend smoke OK"
