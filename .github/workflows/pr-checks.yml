name: PR Checks

on:
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bairronow/frontend lint
      - run: pnpm --filter @bairronow/frontend exec tsc --noEmit
      - run: pnpm --filter @bairronow/frontend test --passWithNoTests
      - run: pnpm --filter @bairronow/frontend build
        env:
          NEXT_PUBLIC_API_URL: https://api.bairronow.com.br

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bairronow/mobile exec tsc --noEmit
      - run: pnpm --filter @bairronow/mobile test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/BairroNow.Api/BairroNow.Api.csproj
      - run: dotnet build src/BairroNow.Api/BairroNow.Api.csproj -c Release --no-restore
      - run: dotnet test tests/BairroNow.Api.Tests/BairroNow.Api.Tests.csproj -c Release --no-restore

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
